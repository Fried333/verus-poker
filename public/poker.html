<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verus Poker</title>
<style>
:root {
  --felt: #1b5e20;
  --felt-light: #2e7d32;
  --felt-dark: #0d3d0d;
  --wood: #4e342e;
  --gold: #ffd700;
  --red: #d32f2f;
  --blue: #1565c0;
  --text: #eee;
  --text-dim: #888;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a1a0a;
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  display: flex;
  flex-direction: column;
}

/* ══════ LAYOUT ══════ */
#table-area {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  min-height: 0;
}
#felt {
  position: relative;
  width: 96%;
  max-width: 900px;
  aspect-ratio: 2.2 / 1;
  background: radial-gradient(ellipse at 50% 50%, var(--felt-light), var(--felt) 60%, var(--felt-dark));
  border: 6px solid var(--wood);
  border-radius: 50%;
  box-shadow: inset 0 0 40px rgba(0,0,0,0.4), 0 4px 20px rgba(0,0,0,0.6);
}
#bottom-bar {
  display: flex;
  align-items: center;
  background: #0a1a0a;
  padding: 10px 14px;
  min-height: 70px;
  flex-shrink: 0;
}

/* ══════ BOARD ══════ */
#board {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -60%);
  display: flex;
  gap: 6px;
}
.board-card {
  width: 50px;
  height: 70px;
  border-radius: 5px;
  overflow: hidden;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.5);
  background: #fff;
  border: 1px solid #ccc;
}
.board-card img, .board-card svg {
  width: 100%;
  height: 100%;
}

#pot-display {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -85px);
  color: var(--gold);
  font-size: 13px;
  font-weight: bold;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}

#hand-info {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, 40px);
  color: var(--text-dim);
  font-size: 14px;
  text-align: center;
}

/* ══════ PLAYER SEATS ══════ */
.seat {
  position: absolute;
  text-align: center;
  transform: translate(-50%, -50%);
  transition: all 0.3s ease;
  z-index: 10;
}
.seat-label {
  position: relative;
  background: rgba(0,0,0,0.7);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  padding: 2px 10px;
  min-width: 70px;
  margin-bottom: 3px;
}
.seat.active .seat-label {
  border-color: var(--gold);
  box-shadow: 0 0 10px rgba(255,215,0,0.4);
}
.seat.me .seat-label {
  border-color: #4caf50;
}
.seat.folded { opacity: 0.3; }

.seat-name {
  font-weight: bold;
  font-size: 11px;
  white-space: nowrap;
}
.seat-role {
  position: absolute;
  top: -10px;
  left: -10px;
  font-size: 10px;
  font-weight: bold;
  padding: 2px 5px;
  border-radius: 3px;
  z-index: 2;
  line-height: 1.2;
}
.role-d { background: #fff; color: #000; }
.role-sb { background: #aaa; color: #000; }
.role-bb { background: #ffd700; color: #000; }
.seat-chips {
  color: #ccc;
  font-size: 11px;
  font-weight: bold;
}
.seat.winner .seat-label {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(255,215,0,0.7), 0 0 40px rgba(255,215,0,0.3);
  animation: winPulse 0.6s ease-in-out 3;
}
@keyframes winPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.7); }
  50% { box-shadow: 0 0 35px rgba(255,215,0,0.9), 0 0 60px rgba(255,215,0,0.4); }
}
.seat-delta {
  font-size: 13px;
  font-weight: bold;
  margin-top: 2px;
}
.seat-delta.win { color: #4caf50; }
.seat-delta.lose { color: #ef5350; }

/* ══════ WINNER BANNER ══════ */
#winner-banner {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.85);
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 12px 28px;
  z-index: 100;
  text-align: center;
  animation: bannerIn 0.3s ease-out;
}
@keyframes bannerIn {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
#winner-banner .wb-title {
  color: var(--gold);
  font-size: 18px;
  font-weight: bold;
}
#winner-banner .wb-detail {
  color: #ccc;
  font-size: 13px;
  margin-top: 4px;
}
.seat-cards {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin-top: 2px;
}
.seat-card {
  width: 50px;
  height: 70px;
  border-radius: 5px;
  overflow: hidden;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.5);
}
.seat-card img {
  width: 100%;
  height: 100%;
}
.card-back {
  background: linear-gradient(135deg, #8b1a1a, #c62828);
  border: 1px solid #d32f2f;
}

/* ══════ TABLE MARKERS ══════ */
.bet-marker {
  position: absolute;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.bet-chip {
  background: var(--gold);
  color: #000;
  border: 2px solid #b8860b;
  border-radius: 50%;
  width: 26px;
  height: 26px;
  line-height: 22px;
  text-align: center;
  font-size: 10px;
  font-weight: bold;
  box-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}
.dealer-btn {
  position: absolute;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 5;
}
.dealer-btn-label {
  background: #fff;
  color: #000;
  border: 2px solid #333;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  line-height: 18px;
  text-align: center;
  font-size: 11px;
  font-weight: bold;
  box-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}
.sb-label {
  background: #aaa;
  color: #000;
  border: 2px solid #666;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  line-height: 18px;
  text-align: center;
  font-size: 9px;
  font-weight: bold;
  box-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}
.bb-label {
  background: #ffd700;
  color: #000;
  border: 2px solid #b8860b;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  line-height: 18px;
  text-align: center;
  font-size: 9px;
  font-weight: bold;
  box-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}

/* ══════ MY HAND ══════ */
#my-hand {
  display: none;  /* Cards shown at seat on felt */
  padding: 4px 16px;
  align-items: center;
  justify-content: center;
  gap: 12px;
  border-top: 2px solid #4caf50;
}
#my-name {
  font-weight: bold;
  color: #4caf50;
  font-size: 13px;
  min-width: 80px;
}
#my-cards {
  display: flex;
  gap: 5px;
}
.my-card {
  width: 50px;
  height: 70px;
  border-radius: 5px;
  overflow: hidden;
  border: 2px solid #4caf50;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.5);
  transition: transform 0.2s;
}
.my-card:hover { transform: translateY(-4px); }
.my-card img {
  width: 100%;
  height: 100%;
}
#my-chips {
  color: var(--text-dim);
  font-size: 12px;
  min-width: 60px;
}

/* ══════ CONTROLS ══════ */
#controls {
  margin-left: auto;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  flex-wrap: nowrap;
  padding: 4px;
  min-width: 360px;
  text-align: right;
}
#controls button {
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
}
#controls button:hover { transform: scale(1.05); }
#controls button:active { transform: scale(0.95); }
.btn-fold { background: #c62828; color: #fff; }
.btn-check { background: #2e7d32; color: #fff; }
.btn-call { background: #1565c0; color: #fff; }
.btn-raise { background: #e65100; color: #fff; }
.btn-allin { background: #6a1b9a; color: #fff; }
#raise-input {
  padding: 3px;
  width: 45px;
  border-radius: 3px;
  border: 1px solid #555;
  background: #222;
  color: #fff;
  text-align: center;
  font-size: 11px;
}
.wait-text { color: var(--text-dim); font-size: 16px; }


/* ══════ COMMS LOG ══════ */
#comms {
  width: 320px;
  min-width: 320px;
  max-height: 80px;
  overflow-y: auto;
  padding: 4px 8px;
  font-size: 12px;
  font-family: 'Consolas', monospace;
  background: rgba(0,0,0,0.6);
  border-radius: 6px;
  z-index: 70;
}
#comms div { padding: 1px 0; }
.c-time { color: #444; margin-right: 6px; }
.c-protocol { color: #4fc3f7; }
.c-cards { color: #81c784; }
.c-betting { color: #ffd54f; }
.c-turn { color: #fff176; }
.c-showdown { color: #ef5350; }
.c-verify { color: #ce93d8; }
.c-system { color: #90a4ae; }
</style>
</head>
<body>

<!-- LOBBY SCREEN — shows table with clickable empty seats -->
<div id="lobby" style="display:flex;flex-direction:column;height:100vh">
  <div style="flex:1;position:relative;display:flex;align-items:flex-start;justify-content:center;padding-top:10px">
    <div id="lobby-info" style="position:absolute;top:4px;left:8px;font-size:11px;color:#666;z-index:10;font-family:monospace">
      <span id="li-table" style="color:#4caf50"></span>
      <span id="li-blinds" style="margin-left:8px"></span>
      <span id="li-mode" style="margin-left:8px"></span>
    </div>
    <div id="lobby-felt" style="position:relative;width:96%;max-width:900px;aspect-ratio:2.2/1;background:radial-gradient(ellipse at 50% 50%,var(--felt-light),var(--felt) 60%,var(--felt-dark));border:6px solid var(--wood);border-radius:50%;box-shadow:inset 0 0 40px rgba(0,0,0,0.4)">
      <div id="lobby-seats"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
        <div style="color:var(--gold);font-size:16px;font-weight:bold" id="lobby-title">Loading...</div>
        <div style="color:#aaa;font-size:12px;margin-top:4px" id="lobby-sub"></div>
      </div>
    </div>
  </div>
</div>

<!-- GAME SCREEN (hidden until joined) -->
<div id="game-screen" style="display:none;flex-direction:column;height:100vh">
  <div id="table-area">
    <div id="table-info" style="position:absolute;top:4px;left:8px;font-size:11px;color:#666;z-index:10;font-family:monospace">
      <span id="ti-table" style="color:#4caf50"></span>
      <span id="ti-blinds" style="margin-left:8px"></span>
      <span id="ti-hand" style="margin-left:8px;color:#ffd700"></span>
      <span id="ti-mode" style="margin-left:8px"></span>
      <span id="ti-verify" style="margin-left:8px;color:#4caf50"></span>
    </div>
    <div id="felt">
      <div id="board"></div>
      <div id="pot-display"></div>
      <div id="hand-info"></div>
      <div id="winner-banner"><div class="wb-title"></div><div class="wb-detail"></div></div>
    </div>
  </div>
  <div id="bottom-bar">
    <div id="comms"></div>
    <div id="controls"><span class="wait-text">Waiting...</span></div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const CARD_SVG = '/cards.bebfd660.svg';
const CARD_BACK = '/bg-red.44d92640.svg';
const DEALER_SVG = '/dealer.b4af8c3d.svg';
const EXPECTED = 9;

// Card name mapping: our format (2c, Ah) matches SVG IDs
// Except T → 10 in the SVG
function svgCardId(name) {
  if (!name || name === '??') return null;
  return name.replace('T', '10');
}

// Card positions in sprite sheet (50x70 each, stacked vertically)
// Order: 10c,10d,10h,10s,2c,2d,2h,2s,3c,...,Ac,Ad,Ah,As,Jc,...,Kc,...,Qc,...
const CARD_ORDER = [
  '10c','10d','10h','10s','2c','2d','2h','2s','3c','3d','3h','3s',
  '4c','4d','4h','4s','5c','5d','5h','5s','6c','6d','6h','6s',
  '7c','7d','7h','7s','8c','8d','8h','8s','9c','9d','9h','9s',
  'Ac','Ad','Ah','As','Jc','Jd','Jh','Js','Kc','Kd','Kh','Ks',
  'Qc','Qd','Qh','Qs'
];
const CARD_Y = {};
CARD_ORDER.forEach((c, i) => CARD_Y[c] = i * 70);

function cardHTML(name, width, height) {
  const w = width || 50;
  const h = height || 70;
  const id = svgCardId(name);
  if (!id || !CARD_Y.hasOwnProperty(id)) {
    return '<img src="' + CARD_BACK + '" style="width:'+w+'px;height:'+h+'px" alt="?">';
  }
  // Scale sprite position: native card is 50x70, sprite is 50 wide
  const scale = h / 70;
  const yOffset = CARD_Y[id] * scale;
  const bgSize = w + 'px auto';
  return '<div style="width:'+w+'px;height:'+h+'px;background:url('+CARD_SVG+') 0 -'+yOffset+'px;background-size:'+bgSize+';border-radius:3px;overflow:hidden"></div>';
}

// Seat positions (% of felt) — arranged for "me" at bottom
// Seat positions (% of felt) — "me" is always index 0 (bottom center)
const POSITIONS = {
  2: [{x:50,y:92},{x:50,y:8}],
  3: [{x:50,y:92},{x:8,y:30},{x:92,y:30}],
  4: [{x:50,y:92},{x:8,y:50},{x:50,y:8},{x:92,y:50}],
  5: [{x:50,y:92},{x:8,y:55},{x:20,y:8},{x:80,y:8},{x:92,y:55}],
  6: [{x:50,y:92},{x:5,y:60},{x:10,y:12},{x:50,y:8},{x:90,y:12},{x:95,y:60}],
  7: [{x:50,y:92},{x:5,y:65},{x:5,y:25},{x:25,y:8},{x:75,y:8},{x:95,y:25},{x:95,y:65}],
  8: [{x:50,y:92},{x:5,y:65},{x:5,y:25},{x:25,y:8},{x:50,y:8},{x:75,y:8},{x:95,y:25},{x:95,y:65}],
  9: [{x:50,y:92},{x:15,y:80},{x:3,y:50},{x:10,y:15},{x:35,y:5},{x:65,y:5},{x:90,y:15},{x:97,y:50},{x:85,y:80}],
};

function getPositions(total, mySeat) {
  const base = POSITIONS[total] || POSITIONS[4];
  const pos = [];
  for (let i = 0; i < total; i++) {
    const offset = (i - mySeat + total) % total;
    pos.push(base[offset] || base[0]);
  }
  return pos;
}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let ws, seat = -1, myId = '', myCards = [], st = null;
let winnerSeats = [], winAmount = 0, chipsBefore = {};
let turnTimer = null, turnDeadline = 0, turnTotal = 0;
let isBusted = false;
const name = new URLSearchParams(location.search).get('name') || 'Player';

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════
// WEBSOCKET
// ══════════════════════════════════════
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);
  ws.onopen = () => ws.send(JSON.stringify({ action: 'join', name }));
  ws.onmessage = e => { try { handle(JSON.parse(e.data)); } catch(x) { console.error(x); } };
  ws.onclose = () => setTimeout(connect, 2000);
}

function handle(m) {
  switch (m.event || m.method) {
    case 'fullstate': handleFullState(m); break;
    case 'joined':
      seat = m.seat; myId = m.id;
      document.getElementById('my-name').textContent = m.id;
      document.getElementById('my-chips').textContent = (m.chips || 200) + ' chips';
      document.getElementById('controls').innerHTML = '<span class="wait-text">Waiting for players...</span>';
      log('system', 'Seated at position ' + (m.seat + 1));
      break;
    case 'state': st = m; render(); break;
    case 'hole_cards':
    case 'deal':
      if (m.deal) {
        if (m.deal.holecards) {
          myCards = m.deal.holecards;
          // Snapshot chips at start of hand for delta display
          if (st && st.players) st.players.forEach(p => { if (!p.empty) chipsBefore[p.seat] = p.chips; });
          winnerSeats = [];
          document.getElementById('winner-banner').style.display = 'none';
          renderBoard([]);
          render();
        }
        if (m.deal.board) renderBoard(m.deal.board);
      } else if (m.cards) {
        myCards = m.cards; render();
      }
      break;
    case 'backend_status': break;
    case 'table_info': break;
    case 'info':
      seat = m.playerid;
      if (m.id) { myId = m.id; document.getElementById('my-name').textContent = m.id; }
      if (!st) st = { players: [], phase: 'waiting', pot: 0, currentTurn: -1 };
      document.getElementById('controls').innerHTML = '<span class="wait-text">Waiting for players...</span>';
      break;
    case 'seats':
      if (m.seats) {
        const prevActions = st ? st.validActions : null;
        const prevToCall = st ? st.toCall : 0;
        const prevMinRaise = st ? st.minRaise : 0;
        st = st || {};
        st.players = m.seats;
        if (m.dealerSeat !== undefined) st.dealerSeat = m.dealerSeat;
        if (m.sbSeat !== undefined) st.sbSeat = m.sbSeat;
        if (m.bbSeat !== undefined) st.bbSeat = m.bbSeat;
        if (m.phase) {
          // Clear board only when explicitly shuffling (new hand)
          if (m.phase.toLowerCase().includes('shuffling') && st.phase !== m.phase) {
            renderBoard([]);
          }
          st.phase = m.phase;
        }
        if (m.pot !== undefined) st.pot = m.pot;
        if (m.currentTurn !== undefined) st.currentTurn = m.currentTurn;
        if (m.handCount) st.handCount = m.handCount;
        // Preserve validActions only if it's still our turn
        if (prevActions && prevActions.length > 0 && m.currentTurn === seat) {
          st.validActions = prevActions;
          st.toCall = prevToCall;
          st.minRaise = prevMinRaise;
        }
        render();
      }
      break;
    case 'dealer': log('system', 'Dealer: seat ' + (m.playerid + 1)); break;
    case 'blindsInfo': log('system', 'Blinds: ' + m.small_blind + '/' + m.big_blind); break;
    case 'betting': handleBetting(m); break;
    case 'finalInfo': handleFinalInfo(m); break;
    case 'comm': log(m.type, m.msg); break;
    case 'comm_history': (m.log || []).forEach(c => log(c.type, c.msg)); break;
    case 'busted':
      log('system', 'You are out of chips!');
      myCards = [];
      isBusted = true;
      document.getElementById('controls').innerHTML =
        '<span class="wait-text" style="color:#ef5350">Out of chips!</span>' +
        '<button class="btn-call" onclick="doReload()" style="margin-left:10px">Reload 200</button>';
      break;
    case 'reloaded':
      log('system', 'Reloaded to ' + m.chips + ' chips — click Sit In to play');
      document.getElementById('controls').innerHTML =
        '<span class="wait-text">' + m.chips + ' chips</span>' +
        '<button class="btn-check" onclick="doSitIn()" style="margin-left:10px">Sit In</button>';
      break;
    case 'satin':
      log('system', 'You are back in — next hand');
      isBusted = false;
      document.getElementById('controls').innerHTML = '<span class="wait-text">Waiting for next hand...</span>';
      break;
    case 'waiting': log('system', 'Waiting for players (' + m.active + '/' + m.needed + ')'); break;
    case 'waiting_next':
      log('system', m.msg || 'Joining next hand');
      document.getElementById('controls').innerHTML = '<span class="wait-text">Seated — joining next hand...</span>';
      break;
    case 'verification':
      updateTableInfo(m.hand, m.valid);
      log('verify', 'Hand #' + m.hand + ': ' + (m.valid ? 'VERIFIED' : 'FAILED'));
      // Keep board + winner banner visible — they clear when next hand's cards arrive
      document.getElementById('controls').innerHTML = '<span class="wait-text">Verified — next hand starting...</span>';
      break;
    case 'error': log('system', 'Error: ' + (m.error || m.message)); break;
  }
}

function startTurnTimer(seconds) {
  stopTurnTimer();
  turnTotal = seconds;
  turnDeadline = Date.now() + seconds * 1000;
  turnTimer = setInterval(() => {
    const remaining = Math.max(0, turnDeadline - Date.now());
    const secs = Math.ceil(remaining / 1000);
    const cd = document.getElementById('felt-countdown');
    if (cd) {
      cd.textContent = secs + 's';
      cd.style.color = secs <= 3 ? '#f44336' : secs <= 5 ? '#ff9800' : '#fff';
    }
    if (remaining <= 0) stopTurnTimer();
  }, 200);
}

function stopTurnTimer() {
  if (turnTimer) { clearInterval(turnTimer); turnTimer = null; }
  const cd = document.getElementById('felt-countdown');
  if (cd) cd.textContent = '';
}

function pName(seatIdx) {
  if (st && st.players && st.players[seatIdx]) return esc(st.players[seatIdx].id || ('Seat ' + (seatIdx+1)));
  return 'Seat ' + (seatIdx+1);
}

function handleBetting(m) {
  switch (m.action) {
    case 'small_blind_bet': log('betting', pName(m.playerid) + ' SB ' + m.amount); break;
    case 'big_blind_bet': log('betting', pName(m.playerid) + ' BB ' + m.amount); break;
    case 'round_betting':
      if (st) {
        st.currentTurn = m.playerid;
        st.pot = m.pot;
        st.toCall = m.toCall;
        st.minRaise = m.minRaiseTo;
        st.validActions = (m.possibilities || []).map(p => ({0:'fold',1:'check',2:'call',3:'raise',7:'allin'})[p]).filter(Boolean);
      }
      startTurnTimer(m.turnTimeout || 15);
      // Match by name (reliable) OR seat (fallback) — but not if busted
      const isMyTurnNow = !isBusted && (m.turnPlayer === name || m.playerid === seat);
      if (isMyTurnNow) {
        const va = st ? st.validActions : [];
        const el = document.getElementById('controls');
        const me = st && st.players ? st.players.find(p => p.seat === seat) : null;
        const myChips = me ? me.chips : 200;
        const callAmt = Math.min(st ? st.toCall||0 : 0, myChips);
        const minR = st ? st.minRaise || 2 : 2;
        const maxR = Math.max(minR, myChips - (st ? st.toCall||0 : 0));
        let html = '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">';
        // Raise slider row (above buttons)
        if (va.includes('raise')) {
          html += '<div style="display:flex;align-items:center;gap:4px">';
          html += '<input id="raise-slider" type="range" min="'+minR+'" max="'+maxR+'" value="'+minR+'" step="1" oninput="document.getElementById(\'raise-input\').value=this.value" style="width:140px;accent-color:#e65100">';
          html += '<input id="raise-input" type="number" min="'+minR+'" max="'+maxR+'" value="'+minR+'" step="1" oninput="if(document.getElementById(\'raise-slider\'))document.getElementById(\'raise-slider\').value=this.value" style="width:50px;padding:2px;border-radius:3px;border:1px solid #555;background:#222;color:#fff;text-align:center;font-size:12px">';
          html += '</div>';
        }
        // Button row
        html += '<div style="display:flex;gap:6px;align-items:center">';
        if (va.includes('fold')) html += '<button class="btn-fold" onclick="act(\'fold\')">Fold</button>';
        if (va.includes('check')) html += '<button class="btn-check" onclick="act(\'check\')">Check</button>';
        if (va.includes('call')) html += '<button class="btn-call" onclick="act(\'call\')">Call ' + callAmt + '</button>';
        if (va.includes('raise')) html += '<button class="btn-raise" onclick="doRaise()">' + ((st&&st.toCall) ? 'Raise' : 'Bet') + '</button>';
        if (va.includes('allin')) html += '<button class="btn-allin" onclick="act(\'allin\')">All In</button>';
        html += '</div></div>';
        if (el) el.innerHTML = html;
      }
      render();
      break;
    case 'fold': case 'check': case 'call': case 'raise': case 'allin': {
      stopTurnTimer();
      // Clear buttons — but not if we're busted (preserve Reload/Sit In)
      if (!isBusted) document.getElementById('controls').innerHTML = '<span class="wait-text">...</span>';
      const act = m.action;
      if (act === 'fold') { log('betting', pName(m.playerid) + (m.timeout ? ' TIMED OUT' : ' folds')); if (st && st.players[m.playerid]) st.players[m.playerid].playing = 0; }
      else if (act === 'check') log('betting', pName(m.playerid) + (m.timeout ? ' TIMED OUT' : ' checks'));
      else if (act === 'call') log('betting', pName(m.playerid) + ' calls ' + (m.bet_amount || m.amount || ''));
      else if (act === 'raise') log('betting', pName(m.playerid) + ' raises ' + (m.bet_amount || m.amount || ''));
      else if (act === 'allin') log('betting', pName(m.playerid) + ' ALL IN ' + (m.bet_amount || m.amount || ''));
      render();
      break;
    }
  }
}

// ══════════════════════════════════════
// SINGLE STATE HANDLER — replaces all fragmented message handling for P2P mode
// Receives ONE message with ALL game state. Sets everything, renders once.
// ══════════════════════════════════════
function handleFullState(m) {
  // 1. Set ALL state at once
  st = st || {};
  st.players = m.seats;
  st.phase = m.phase;
  st.pot = m.pot;
  st.dealerSeat = m.dealerSeat;
  st.sbSeat = m.sbSeat;
  st.bbSeat = m.bbSeat;
  st.currentTurn = m.currentTurn;
  st.handCount = m.handCount;

  // 2. Cards
  myCards = m.myCards || [];

  // 3. Board
  renderBoard(m.board || []);

  // 4. Action buttons
  const el = document.getElementById('controls');
  if (m.actions && m.actions.possibilities && m.actions.possibilities.length > 0) {
    st.validActions = m.actions.possibilities;
    st.toCall = m.actions.toCall || 0;
    st.minRaise = m.actions.minRaiseTo || 2;

    // Build buttons
    const me2 = st.players ? st.players.find(p => p.seat === seat) : null;
    const myChips2 = me2 ? me2.chips : 200;
    const callAmt = Math.min(st.toCall, myChips2);
    const minR = st.minRaise || 2;
    const maxR = Math.max(minR, myChips2 - st.toCall);
    const va = m.actions.possibilities;
    let html = '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">';
    if (va.includes(3)) {
      html += '<div style="display:flex;align-items:center;gap:4px">';
      html += '<input id="raise-slider" type="range" min="'+minR+'" max="'+maxR+'" value="'+minR+'" step="1" oninput="document.getElementById(\'raise-input\').value=this.value" style="width:140px;accent-color:#e65100">';
      html += '<input id="raise-input" type="number" min="'+minR+'" max="'+maxR+'" value="'+minR+'" step="1" oninput="if(document.getElementById(\'raise-slider\'))document.getElementById(\'raise-slider\').value=this.value" style="width:50px;padding:2px;border-radius:3px;border:1px solid #555;background:#222;color:#fff;text-align:center;font-size:12px">';
      html += '</div>';
    }
    html += '<div style="display:flex;gap:6px;align-items:center">';
    if (va.includes(0)) html += '<button class="btn-fold" onclick="act(\'fold\')">Fold</button>';
    if (va.includes(1)) html += '<button class="btn-check" onclick="act(\'check\')">Check</button>';
    if (va.includes(2)) html += '<button class="btn-call" onclick="act(\'call\')">Call ' + callAmt + '</button>';
    if (va.includes(3)) html += '<button class="btn-raise" onclick="doRaise()">' + (st.toCall ? 'Raise' : 'Bet') + '</button>';
    if (va.includes(7)) html += '<button class="btn-allin" onclick="act(\'allin\')">All In</button>';
    html += '</div></div>';
    if (el) el.innerHTML = html;
    startTurnTimer(m.actions.turnTimeout || 30);
  } else if (m.phase === 'waiting' || m.phase === 'shuffling' || m.phase?.includes('aiting') || m.phase?.includes('huffling')) {
    stopTurnTimer();
    if (el) el.innerHTML = '<span class="wait-text">' + (m.message || m.phase) + '</span>';
  } else if (!m.actions) {
    stopTurnTimer();
    if (el && !el.querySelector('button')) {
      el.innerHTML = '<span class="wait-text">Waiting...</span>';
    }
  }

  // 5. Winner banner
  const banner = document.getElementById('winner-banner');
  if (m.winner && m.winner.winners && m.winner.winners.length > 0) {
    const names = m.winner.winners.map(s => m.winner.playerNames?.[s] || 'Seat '+(s+1));
    const hNames = m.winner.handNames || {};
    const winHand = m.winner.winners.map(s => hNames[s]).filter(Boolean).join(', ');
    banner.querySelector('.wb-title').textContent = names.join(' & ') + ' wins!';
    banner.querySelector('.wb-detail').textContent = (winHand ? winHand + ' — ' : '') + '+' + m.winner.win_amount + ' chips';
    banner.style.display = 'block';
    winnerSeats = m.winner.winners;
    winAmount = m.winner.win_amount;
  } else {
    banner.style.display = 'none';
    winnerSeats = [];
    winAmount = 0;
  }

  // 6. Verification
  if (m.verified !== null && m.verified !== undefined) {
    updateTableInfo(m.handCount, m.verified);
  }

  // 7. Render seats (one pass)
  render();
}

function handleFinalInfo(m) {
  stopTurnTimer();
  log('showdown', '═══ SHOWDOWN ═══');
  const cards = m.showInfo?.allHoleCardsInfo || {};
  const board = m.showInfo?.boardCardInfo || [];
  const hNames = m.handNames || {};
  for (const [seatStr, h] of Object.entries(cards)) {
    const s = Number(seatStr);
    if (h && h[0]) {
      const hn = hNames[s] ? ' — ' + hNames[s] : '';
      log('showdown', pName(s) + ': ' + h.join(' ') + hn);
    }
  }

  winnerSeats = m.winners || [];
  winAmount = m.win_amount || 0;
  const pn = m.playerNames || {}; // seat → player name from server

  // Show winner banner with hand name
  const banner = document.getElementById('winner-banner');
  if (winnerSeats.length > 0) {
    const names = winnerSeats.map(s => pn[s] || (st && st.players && st.players[s] ? st.players[s].id : null) || 'Seat '+(s+1));
    const winHand = winnerSeats.map(s => hNames[s]).filter(Boolean).join(', ');
    banner.querySelector('.wb-title').textContent = names.join(' & ') + ' wins!';
    banner.querySelector('.wb-detail').textContent = (winHand ? winHand + ' — ' : '') + '+' + winAmount + ' chips';
    banner.style.display = 'block';
  }

  winnerSeats.forEach(w => {
    const name = pn[w] || pName(w);
    const hn = hNames[w] ? ' with ' + hNames[w] : '';
    log('showdown', '★ ' + name + ' WINS ' + winAmount + hn);
  });
  if (board.length) renderBoard(board);
  render();

  // Reset after delay
  setTimeout(() => {
    myCards = [];
    winnerSeats = [];
    winAmount = 0;
    chipsBefore = {};
    banner.style.display = 'none';
    renderBoard([]);
    render();
  }, 5000);
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function renderBoard(cards) {
  const el = document.getElementById('board');
  el.innerHTML = '';
  for (let i = 0; i < cards.length; i++) {
    if (!cards[i]) continue;
    const div = document.createElement('div');
    div.className = 'board-card dealt';
    div.innerHTML = cardHTML(cards[i], 50, 70);
    el.appendChild(div);
  }
}

function render() {
  if (!st || !st.players) return;
  const felt = document.getElementById('felt');
  const np = st.players.filter(p => !p.empty).length;
  const positions = getPositions(np, seat >= 0 ? seat : 0);
  const cx = 50, cy = 45;

  // Clear old seats/markers
  felt.querySelectorAll('.seat,.bet-marker,.dealer-btn').forEach(e => e.remove());

  // Pot
  document.getElementById('pot-display').textContent = st.pot > 0 ? 'Pot: ' + st.pot : '';
  document.getElementById('hand-info').textContent = st.phase || '';

  // Players
  let pIdx = 0;
  for (const p of st.players) {
    if (p.empty) continue;
    const pos = positions[pIdx] || { x: 50, y: 50 };
    const isMe = p.seat === seat;
    const isActive = st.currentTurn === p.seat;
    const isWinner = winnerSeats.includes(p.seat);

    // Seat box
    const el = document.createElement('div');
    el.className = 'seat' + (isActive ? ' active' : '') + (p.playing === 0 ? ' folded' : '') + (isMe ? ' me' : '') + (isWinner ? ' winner' : '');
    el.style.left = pos.x + '%';
    el.style.top = pos.y + '%';

    let cardsHtml = '';
    if (isMe && myCards.length > 0) {
      cardsHtml += '<span id="felt-countdown" style="font-weight:bold;font-size:14px;color:#fff;margin-right:4px"></span>';
      for (const c of myCards) {
        cardsHtml += '<div class="seat-card">' + cardHTML(c) + '</div>';
      }
    } else if (!isMe && p.holeCardNames && !p.folded) {
      for (const c of p.holeCardNames) {
        if (c === '??' || !c) {
          cardsHtml += '<div class="seat-card card-back"></div>';
        } else {
          cardsHtml += '<div class="seat-card">' + cardHTML(c) + '</div>';
        }
      }
    }

    // Chip delta (show after showdown)
    let deltaHtml = '';
    if (winnerSeats.length > 0 && chipsBefore[p.seat] !== undefined) {
      const delta = p.chips - chipsBefore[p.seat];
      if (delta > 0) deltaHtml = '<div class="seat-delta win">+' + delta + '</div>';
      else if (delta < 0) deltaHtml = '<div class="seat-delta lose">' + delta + '</div>';
    }

    // Dealer button only
    let roleTag = '';
    if (p.seat === st.dealerSeat) roleTag = '<span class="seat-role role-d">D</span>';

    if (isMe) {
      // Own seat: cards on top, name below
      el.innerHTML =
        (cardsHtml ? '<div class="seat-cards">' + cardsHtml + '</div>' : '') +
        '<div class="seat-label">' +
          '<div class="seat-name">' + roleTag + esc(p.id || p.name || 'Seat ' + (p.seat+1)) + '</div>' +
          '<div class="seat-chips">' + (p.chips !== undefined ? p.chips : '') + '</div>' +
          deltaHtml +
        '</div>';
    } else {
      // Others: name on top, cards below
      el.innerHTML =
        '<div class="seat-label">' +
          '<div class="seat-name">' + roleTag + esc(p.id || p.name || 'Seat ' + (p.seat+1)) + '</div>' +
          '<div class="seat-chips">' + (p.chips !== undefined ? p.chips : '') + '</div>' +
          deltaHtml +
        '</div>' +
        (cardsHtml ? '<div class="seat-cards">' + cardsHtml + '</div>' : '');
    }
    felt.appendChild(el);

    // Bet chip
    if (p.bet > 0) {
      const bx = pos.x + (cx - pos.x) * 0.6;
      const by = pos.y + (cy - pos.y) * 0.6;
      const bet = document.createElement('div');
      bet.className = 'bet-marker';
      bet.style.left = bx + '%';
      bet.style.top = by + '%';
      bet.innerHTML = '<div class="bet-chip">' + p.bet + '</div>';
      felt.appendChild(bet);
    }

    // D/SB/BB shown in name label above

    pIdx++;
  }

  // Cards now shown at seat on the felt — clear bottom bar cards
  document.getElementById('my-cards').innerHTML = '';

  // My chips — find by seat or by ID
  const me = st.players.find(p => p.seat === seat) || st.players.find(p => p.id === myId);
  document.getElementById('my-chips').textContent = me ? me.chips + ' chips' : '';

  // Controls
  renderControls();
}

function renderControls() {
  const el = document.getElementById('controls');
  if (!el) return;
  if (!st) return;

  // Don't overwrite anything when busted (Reload/Sit In buttons) or when action buttons showing
  if (isBusted) return;
  if (el.querySelector('button')) return;

  let html = '';
  if (st.phase === 'shuffling') {
    html = '<span class="wait-text" style="color:#ffd700">Shuffling deck on-chain...</span>';
  } else if (st.phase === 'showdown' || st.phase === 'settled') {
    html = '<span class="wait-text">Next hand...</span>';
  } else if (st.currentTurn >= 0 && st.currentTurn !== seat) {
    const tp = st.players ? st.players.find(p => p.seat === st.currentTurn) : null;
    html = '<span class="wait-text">Waiting: ' + (tp ? esc(tp.id) : '...') + '</span>';
  } else if (st.currentTurn < 0) {
    html = '<span class="wait-text">' + (st.phase || '...') + '</span>';
  }
  // Don't overwrite with empty/waiting if controls already has something meaningful
  if (html) el.innerHTML = html;
}

function act(action) {
  ws.send(JSON.stringify({ action }));
  st.validActions = [];
  stopTurnTimer();
  document.getElementById('controls').innerHTML = '<span class="wait-text">...</span>';
}

function doRaise() {
  const input = document.getElementById('raise-input');
  ws.send(JSON.stringify({ action: 'raise', amount: parseFloat(input.value) }));
  st.validActions = [];
  stopTurnTimer();
  document.getElementById('controls').innerHTML = '<span class="wait-text">...</span>';
}

function doReload() {
  ws.send(JSON.stringify({ action: 'reload' }));
}

function doSitIn() {
  ws.send(JSON.stringify({ action: 'sitin' }));
}

function log(type, msg) {
  const el = document.getElementById('comms');
  const div = document.createElement('div');
  div.className = 'c-' + (type || 'system');
  const time = new Date().toTimeString().substring(0, 8);
  div.innerHTML = '<span class="c-time">' + time + '</span>' + msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

// ══════════════════════════════════════
// LOBBY — visual table with 9 seats
// ══════════════════════════════════════
const SEAT_POS_9 = [
  {x:50,y:90},{x:15,y:78},{x:3,y:48},{x:10,y:14},{x:35,y:4},{x:65,y:4},{x:90,y:14},{x:97,y:48},{x:85,y:78}
];

async function loadLobby() {
  const title = document.getElementById('lobby-title');
  const sub = document.getElementById('lobby-sub');
  const seatsDiv = document.getElementById('lobby-seats');
  try {
    const res = await fetch('/api/table');
    const info = await res.json();

    const buyin = info.buyin || 0.5;
    // Table info in corner
    const ti = id => document.getElementById(id);
    if (ti('li-table')) ti('li-table').textContent = esc(info.table || '');
    if (ti('li-blinds')) ti('li-blinds').textContent = (info.config?.smallBlind||1) + '/' + (info.config?.bigBlind||2) + ' blinds';
    if (ti('li-mode')) ti('li-mode').textContent = info.mode || '';

    // Center text
    title.textContent = esc(info.table || 'Poker Table');
    sub.textContent = (info.config?.smallBlind||1) + '/' + (info.config?.bigBlind||2) + ' blinds · ' + buyin + ' CHIPS buy-in';

    // Render 9 seats
    seatsDiv.innerHTML = '';
    const occupied = {}; // seat → player name
    // Dealer is always at a seat
    if (info.dealer && info.role === 'player') occupied[1] = info.dealer;
    if (info.role === 'dealer') occupied[0] = info.player;

    for (let s = 0; s < 9; s++) {
      const pos = SEAT_POS_9[s];
      const div = document.createElement('div');
      div.style.cssText = 'position:absolute;left:'+pos.x+'%;top:'+pos.y+'%;transform:translate(-50%,-50%);text-align:center;z-index:5';

      if (occupied[s]) {
        // Occupied seat
        div.innerHTML =
          '<div style="background:rgba(0,0,0,0.7);border:2px solid #4caf50;border-radius:6px;padding:3px 10px;min-width:60px">' +
            '<div style="font-size:11px;font-weight:bold;color:#fff">' + esc(occupied[s]) + '</div>' +
            '<div style="font-size:10px;color:#aaa">200</div>' +
          '</div>';
      } else {
        // Empty seat — clickable
        div.innerHTML =
          '<button onclick="pickSeat('+s+')" style="background:rgba(0,0,0,0.4);border:2px dashed rgba(255,255,255,0.2);border-radius:6px;padding:8px 14px;cursor:pointer;color:#aaa;font-size:11px;min-width:60px">' +
            'Sit Here' +
          '</button>';
      }
      seatsDiv.appendChild(div);
    }
  } catch (e) {
    title.textContent = 'Cannot load table';
    sub.textContent = e.message;
  }
}

async function pickSeat(seatNum) {
  const title = document.getElementById('lobby-title');
  const sub = document.getElementById('lobby-sub');
  title.textContent = 'Joining seat ' + (seatNum + 1) + '...';
  sub.textContent = 'Connecting to table';
  // Go straight to game — deposit can happen later
  joinGame();
}

async function doDeposit(amount) {
  const actions = document.getElementById('lobby-actions');
  actions.innerHTML = '<div style="color:#ffd700">Depositing ' + amount + ' CHIPS to escrow...</div>';

  try {
    const res = await fetch('/api/deposit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount })
    });
    const result = await res.json();
    if (result.ok) {
      actions.innerHTML = '<div style="color:#4caf50">Deposited! TX: ' + result.txid.substring(0, 16) + '... Joining...</div>';
      setTimeout(() => joinGame(), 2000);
    } else {
      actions.innerHTML =
        '<div style="color:#ef5350;margin-bottom:8px">Deposit failed: ' + esc(result.error) + '</div>' +
        '<button onclick="doDeposit(' + amount + ')" style="padding:8px 20px;background:#333;color:#fff;border:1px solid #555;border-radius:4px;cursor:pointer">Retry</button>' +
        '<button onclick="joinGame()" style="padding:8px 20px;background:#4caf50;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-left:8px">Skip & Play (virtual)</button>';
    }
  } catch (e) {
    actions.innerHTML =
      '<div style="color:#ef5350">' + esc(e.message) + '</div>' +
      '<button onclick="joinGame()" style="padding:8px 20px;background:#4caf50;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-top:8px">Skip & Play</button>';
  }
}

function joinGame() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  renderBoard([]);
  // Tell server player is sitting down (triggers chain join in P2P mode)
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ action: 'sit' }));
  // Populate table info bar
  fetch('/api/table').then(r=>r.json()).then(info => {
    const ti = id => document.getElementById(id);
    if (ti('ti-table')) ti('ti-table').textContent = info.table || '';
    if (ti('ti-blinds')) ti('ti-blinds').textContent = (info.config?.smallBlind||1) + '/' + (info.config?.bigBlind||2);
    if (ti('ti-mode')) ti('ti-mode').textContent = info.mode || '';
    if (ti('ti-hand')) ti('ti-hand').textContent = '';
    // Show session in comms if available
    if (info.session) log('system', 'Session: ' + info.session);
    // Player sees waiting message until dealer starts dealing
    if (info.role === 'player') {
      document.getElementById('controls').innerHTML = '<span class="wait-text">Waiting for dealer to start hand...</span>';
      log('system', 'Joined table. Waiting for dealer to start hand...');
    }
  }).catch(()=>{});
  connect();
}

// Update hand count and verification in table info
function updateTableInfo(hand, verified) {
  const ti = id => document.getElementById(id);
  if (hand && ti('ti-hand')) ti('ti-hand').textContent = 'Hand #' + hand;
  if (verified !== undefined && ti('ti-verify')) ti('ti-verify').textContent = verified ? '✓ Verified' : '✗ Failed';
}

// Dealer goes straight to game, player sees lobby
async function init() {
  try {
    const res = await fetch('/api/table');
    const info = await res.json();
    if (info.role === 'dealer') {
      joinGame(); // Dealer is already seated
    } else {
      loadLobby(); // Player picks a seat
    }
  } catch (e) {
    loadLobby();
  }
}
init();
